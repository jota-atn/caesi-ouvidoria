<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAESI — Cadastro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Estrelas decorativas -->
  <div class="deco-star" style="top:6%;left:5%;font-size:2rem;">✦</div>
  <div class="deco-star" style="top:10%;right:7%;font-size:1rem;opacity:0.45;">✦</div>
  <div class="deco-star" style="bottom:20%;left:7%;font-size:0.9rem;opacity:0.4;">✦</div>
  <div class="deco-star" style="bottom:8%;right:5%;font-size:2rem;opacity:0.8;">✦</div>

  <!-- Pixel art -->
<div class="login-page" style="padding-top:3rem;padding-bottom:3rem;">

    <!-- Logo -->
    <div class="login-logo-area" style="margin-bottom:1.5rem;">
      <div class="login-logo-circle">CE</div>
      <div class="login-title">CAESI</div>
      <div class="login-subtitle">Crie sua conta para acessar a ouvidoria</div>
    </div>

    <!-- Card -->
    <div class="login-card" style="max-width:460px;">
      <div class="paper">
        <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:var(--roxo-escuro);margin-bottom:1.5rem;">
          Criar conta
        </h2>

        <form id="cadastro-form" novalidate>

          <div class="field">
            <label for="nome">Nome completo *</label>
            <input type="text" id="nome" placeholder="Ex: João da Silva" required>
            <span class="error-msg">Preencha seu nome completo.</span>
          </div>

          <div class="field">
            <label for="matricula">Matrícula *</label>
            <input type="text" id="matricula" placeholder="Ex: 123456789" required
              oninput="this.value=this.value.replace(/\D/g,'')">
            <span class="error-msg">Preencha sua matrícula.</span>
          </div>

          <div class="field">
            <label for="email">E-mail institucional *</label>
            <input type="email" id="email" placeholder="nome@ccc.ufcg.edu.br" required>
            <span class="error-msg">Preencha um e-mail válido.</span>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="field" style="position:relative;">
              <label for="senha">Senha *</label>
              <input type="password" id="senha" placeholder="••••••••" required minlength="6">
              <button type="button" onclick="toggleField('senha')"
                style="position:absolute;right:12px;bottom:10px;background:none;border:none;cursor:pointer;font-size:0.9rem;color:var(--cinza);">👁</button>
              <span class="error-msg">Mínimo 6 caracteres.</span>
            </div>
            <div class="field" style="position:relative;">
              <label for="confirma-senha">Confirmar *</label>
              <input type="password" id="confirma-senha" placeholder="••••••••" required>
              <button type="button" onclick="toggleField('confirma-senha')"
                style="position:absolute;right:12px;bottom:10px;background:none;border:none;cursor:pointer;font-size:0.9rem;color:var(--cinza);">👁</button>
              <span class="error-msg" id="confirma-error">As senhas não coincidem.</span>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.4rem;">
            Criar conta →
          </button>

        </form>
      </div>
      <div class="kraft-strip"></div>
    </div>

    <div class="login-footer-link" style="margin-top:1.2rem;">
      Já tem conta? <a href="login.html">Entrar</a>
    </div>

  </div>

  <script>
    function toggleField(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('cadastro-form').addEventListener('submit', function(e) {
      e.preventDefault();
      let valid = true;

      const nome    = document.getElementById('nome');
      const mat     = document.getElementById('matricula');
      const email   = document.getElementById('email');
      const senha   = document.getElementById('senha');
      const confirma = document.getElementById('confirma-senha');
      const confirmaError = document.getElementById('confirma-error');

      [nome, mat, email, senha, confirma].forEach(el => el.classList.remove('invalid'));

      if (!nome.value.trim())  { nome.classList.add('invalid'); valid = false; }
      if (!mat.value.trim())   { mat.classList.add('invalid'); valid = false; }
      if (!email.value.includes('@')) { email.classList.add('invalid'); valid = false; }
      if (senha.value.length < 6)    { senha.classList.add('invalid'); valid = false; }

      if (confirma.value !== senha.value) {
        confirma.classList.add('invalid');
        confirmaError.textContent = 'As senhas não coincidem.';
        valid = false;
      }

      if (valid) window.location.href = 'aluno-mensagens.html';
    });
  </script>
</body>
</html>
