<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAESI — Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Estrelas decorativas -->
  <div class="deco-star" style="top:7%;left:5%;font-size:2rem;">✦</div>
  <div class="deco-star" style="top:11%;right:7%;font-size:1rem;opacity:0.45;">✦</div>
  <div class="deco-star" style="bottom:22%;left:8%;font-size:1rem;opacity:0.45;">✦</div>
  <div class="deco-star" style="bottom:10%;right:5%;font-size:2.2rem;">✦</div>
  <div class="deco-star" style="top:42%;left:2.5%;font-size:0.75rem;opacity:0.35;">✦</div>
  <div class="deco-star" style="top:32%;right:3%;font-size:0.75rem;opacity:0.35;">✦</div>


<div class="login-page">

    <div class="login-logo-area">
      <div class="login-logo-circle">CE</div>
      <div class="login-title">CAESI</div>
      <div class="login-subtitle">Centro Acadêmico de Ciência da Computação · UFCG</div>
      <span class="login-badge">Ouvidoria</span>
    </div>

    <!-- Card do formulário -->
    <div class="login-card">
      <div class="paper">
        <h2 style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:var(--roxo-escuro);margin-bottom:1.5rem;">
          Entrar na sua conta
        </h2>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="login-email">Matrícula ou e-mail</label>
            <input type="text" id="login-email" placeholder="Ex: 123456789 ou nome@ccc.ufcg.edu.br" required>
            <span class="error-msg">Preencha sua matrícula ou e-mail.</span>
          </div>

          <div class="field" style="position:relative;">
            <label for="login-senha">Senha</label>
            <input type="password" id="login-senha" placeholder="••••••••" required>
            <button type="button" onclick="toggleSenha()"
              style="position:absolute;right:12px;bottom:10px;background:none;border:none;cursor:pointer;font-size:1rem;color:var(--cinza);">
              👁
            </button>
            <span class="error-msg">Preencha sua senha.</span>
          </div>

          <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">
            Entrar →
          </button>
        </form>

        <hr class="divider" style="margin:1.2rem 0;">

        <div style="text-align:center;">
          <a href="#" style="font-size:0.85rem;color:var(--roxo-escuro);font-weight:600;text-decoration:none;">
            Esqueci minha senha
          </a>
        </div>
      </div>
      <div class="kraft-strip"></div>
    </div>

    <div class="login-footer-link" style="margin-top:1.2rem;">
      Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a>
    </div>

  </div>

  <script>
    function toggleSenha() {
      const input = document.getElementById('login-senha');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      let valid = true;
      const email = document.getElementById('login-email');
      const senha = document.getElementById('login-senha');

      email.classList.remove('invalid');
      senha.classList.remove('invalid');

      if (!email.value.trim()) { email.classList.add('invalid'); valid = false; }
      if (!senha.value.trim()) { senha.classList.add('invalid'); valid = false; }

      if (valid) window.location.href = 'aluno-mensagens.html';
    });
  </script>
</body>
</html>
